<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sociology | Triverge 2025</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <style>
    /* --- THEME VARIABLES --- */
    :root {
      --bg-dark: #030014;
      --bg-card: rgba(255, 255, 255, 0.03);
      --border-light: rgba(255, 255, 255, 0.08);
      --primary: #7000ff;
      --secondary: #00d2ff;
      --accent: #ff007a;
      --text-main: #ffffff;
      --text-muted: #94a3c8;
      --font-head: 'Space Grotesk', sans-serif;
      --font-body: 'Outfit', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      background-color: var(--bg-dark);
      scroll-behavior: smooth;
    }

    body {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
      background-color: transparent;
      color: var(--text-main);
      font-family: var(--font-body);
      line-height: 1.6;
      position: relative;
    }

    /* --- BACKGROUND SYSTEM --- */
    .background-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
      z-index: -1; overflow: hidden; pointer-events: none;
    }

    .ambient-light {
      position: absolute; border-radius: 50%; filter: blur(80px);
      opacity: 0.4; animation: floatLight 10s infinite alternate;
    }
    .light-1 { width: 600px; height: 600px; top: -100px; left: -100px; background: var(--primary); }
    .light-2 { width: 500px; height: 500px; bottom: -100px; right: -100px; background: var(--secondary); animation-delay: 5s; }

    .grid-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      width: 100%; height: 100%;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 50px 50px; z-index: -1;
      mask-image: radial-gradient(circle at center, black, transparent 80%);
      -webkit-mask-image: radial-gradient(circle at center, black, transparent 80%);
      pointer-events: none;
    }

    @keyframes floatLight {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }

    /* --- HEADER / NAVBAR --- */
    header {
      position: fixed;
      top: 0; left: 0; width: 100%;
      padding: 1rem 0;
      background: rgba(3, 0, 20, 0.9);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-bottom: 1px solid var(--border-light);
      z-index: 1000;
    }

    .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: var(--font-head);
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      letter-spacing: -1px;
      display: flex;
      align-items: center;
    }

    .nav-logo {
      height: 40px;
      width: auto;
      margin-right: 10px;
    }

    .back-link {
      color: var(--text-muted);
      font-weight: 600;
      text-decoration: none;
      font-size: 0.9rem;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-link:hover { color: var(--secondary); }

    /* --- MAIN CONTENT --- */
    main { padding-top: 180px; padding-bottom: 4rem; }

    .dept-hero {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeUp 0.8s ease;
    }

    .dept-logo {
      height: 100px;
      width: auto;
      margin-bottom: 1.5rem;
      filter: drop-shadow(0 0 15px rgba(112, 0, 255, 0.3));
    }

    .dept-title {
      font-family: var(--font-head);
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(to right, #fff, var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
      line-height: 1.1;
    }

    .dept-desc {
      color: var(--text-muted);
      font-size: 1.1rem;
      max-width: 700px;
      margin: 0 auto;
    }
    
    .hero-btn {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.8rem 2rem;
        background: linear-gradient(45deg, var(--primary), #5b21b6);
        color: white;
        border-radius: 50px;
        font-weight: 600;
        box-shadow: 0 4px 15px rgba(112, 0, 255, 0.4);
        transition: 0.3s;
        text-decoration: none;
    }
    .hero-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(112, 0, 255, 0.6);
        color: white;
    }

    /* --- EVENTS LIST --- */
    .events-wrapper {
      display: grid;
      gap: 1.5rem;
      margin-bottom: 4rem;
    }

    .event-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(12px);
      transition: 0.3s;
      position: relative;
      overflow: hidden;
    }

    .event-card:hover {
      border-color: var(--primary);
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.05);
    }

    .event-card h3 {
      font-size: 1.5rem;
      color: var(--secondary);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .event-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .detail-item {
      font-size: 0.95rem;
      color: #ddd;
    }
    .detail-item strong { color: var(--text-muted); font-weight: 500; font-size: 0.85rem; text-transform: uppercase; display: block; margin-bottom: 2px;}

    .price-tag {
      color: #5aff96;
      font-weight: 700;
    }

    .event-rules {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-light);
    }
    .event-rules h4 { font-size: 1rem; color: white; margin-bottom: 0.5rem; }
    .event-rules ul { list-style: none; padding-left: 0; }
    .event-rules li { 
      position: relative; padding-left: 20px; margin-bottom: 5px; color: var(--text-muted); font-size: 0.9rem; 
    }
    .event-rules li::before {
      content: '•'; position: absolute; left: 0; color: var(--primary);
    }

    /* --- FORM SECTION --- */
    .form-container {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 20px;
      padding: 2rem;
      backdrop-filter: blur(12px);
    }

    .form-title {
      text-align: center;
      margin-bottom: 2rem;
      font-size: 2rem;
      color: white;
    }

    iframe { width: 100%; border: none; min-height: 600px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .dept-title { font-size: 2.2rem; }
      .event-details { grid-template-columns: 1fr; }
      .container { padding: 0 15px; }
    }
  </style>
</head>
<body>

  <div class="background-container">
    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>
    <div class="grid-overlay"></div>
  </div>

  <header>
    <div class="container header-content">
      <div class="logo">
        <img src="../../logo.png" alt="Triverge Logo" class="nav-logo"> TRIVERGE '25
      </div>
      <nav>
        <a href="../" class="back-link">
          <i class="fas fa-arrow-left"></i> Events
        </a>
      </nav>
    </div>
  </header>

  <main class="container">
    
    <!-- Hero Section -->
    <div class="dept-hero">
      <h1 class="dept-title">Skit Competition</h1>
      <p class="dept-desc">
        Department of Sociology. Express social themes through dramatic art.
      </p>
      <a href="#register" class="hero-btn">Register Now <i class="fas fa-arrow-down"></i></a>
    </div>

    <!-- Events Grid -->
    <div class="events-wrapper">
      
      <div class="event-card">
        <h3><i class="fas fa-theater-masks"></i> Skit</h3>
        <div class="event-details">
          <div class="detail-item"><strong>Theme</strong> Gender Equality</div>
          <div class="detail-item"><strong>Team</strong> 6 Members</div>
          <div class="detail-item"><strong>Prize Pool</strong> <span class="price-tag">₹10,000</span></div>
        </div>
        <div class="event-rules">
            <h4>Guidelines</h4>
            <ul>
                <li>Duration: 12-15 minutes.</li>
            </ul>
        </div>
      </div>

    </div>

    <!-- Registration Form -->
    <div id="register" class="form-container">
      <h2 class="form-title">Registration</h2>
      <iframe data-tally-src="https://tally.so/embed/vGXrrQ?hideTitle=1&dynamicHeight=1&transparentBackground=1" title="Registration Form"></iframe>
    </div>

  </main>

  <script async src="https://tally.so/widgets/embed.js"></script>
</body>
</html>
